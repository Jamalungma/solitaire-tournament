<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ — Турнир по Косынке</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f9f9f9;
      color: #111;
      line-height: 1.6;
    }

    header {
      border-bottom: 1px solid #e0e0e0;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .logo { font-size: 18px; font-weight: 600; }

    header a {
      font-size: 14px;
      color: #555;
      text-decoration: none;
    }

    header a:hover { color: #111; }

    .container {
      max-width: 800px;
      margin: 60px auto;
      padding: 0 40px;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.8px;
      margin-bottom: 32px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 48px;
    }

    .stat-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px;
    }

    .stat-card .label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .stat-card .value.orange { color: #f60; }
    .stat-card .value.green { color: #2e7d32; }
    .stat-card .value.yellow { color: #f57f17; }
    .stat-card .value.red { color: #c62828; }

    h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      overflow: hidden;
    }

    thead th {
      text-align: left;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #888;
      padding: 12px 16px;
      border-bottom: 1px solid #e0e0e0;
      background: #fafafa;
    }

    tbody tr { border-bottom: 1px solid #f0f0f0; }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 12px 16px; }

    .level-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
    }

    .level-beginner { background: #e8f5e9; color: #2e7d32; }
    .level-intermediate { background: #fff8e1; color: #f57f17; }
    .level-pro { background: #fce4ec; color: #c62828; }

    .btn-delete {
      background: none;
      border: none;
      color: #bbb;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      transition: color 0.15s;
    }

    .btn-delete:hover { color: #e53; }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #888;
      font-size: 14px;
    }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: #1a1a1a; }
    .toast.error { background: #e53; }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 100px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: #111; color: #111; }
    .filter-btn.active { background: #111; color: #fff; border-color: #111; }

    .btn-export {
      padding: 6px 16px;
      border-radius: 100px;
      border: 1px solid #111;
      background: #111;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-export:hover { background: #333; border-color: #333; }

    .search-input {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
      width: 200px;
      transition: border-color 0.15s;
    }

    .search-input:focus { outline: none; border-color: #111; }

    .date-cell { color: #888; font-size: 13px; }

    @media (max-width: 600px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      header, .container { padding: 16px 20px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">♠ Косынка — Админ</div>
    <a href="index.html">← На сайт</a>
  </header>

  <div class="container">
    <h1>Статистика</h1>

    <div class="stats">
      <div class="stat-card">
        <div class="label">Всего</div>
        <div class="value orange" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Новичков</div>
        <div class="value green" id="stat-beginner">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Средних</div>
        <div class="value yellow" id="stat-intermediate">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Профи</div>
        <div class="value red" id="stat-pro">—</div>
      </div>
    </div>

    <h2>Участники</h2>

    <div style="display:flex; gap:8px; margin-bottom:16px; align-items:center; flex-wrap:wrap;">
      <button class="filter-btn active" onclick="setFilter('all')">Все</button>
      <button class="filter-btn" onclick="setFilter('beginner')">Новички</button>
      <button class="filter-btn" onclick="setFilter('intermediate')">Средние</button>
      <button class="filter-btn" onclick="setFilter('pro')">Профи</button>
      <input type="text" id="search-input" class="search-input" placeholder="Поиск по имени..." oninput="onSearch()">
    </div>

    <div style="display:flex; gap:8px; margin-bottom:16px; align-items:center; flex-wrap:wrap;">
      <button class="filter-btn active date-filter-btn" onclick="setDateFilter('all')">Все даты</button>
      <button class="filter-btn date-filter-btn" onclick="setDateFilter('today')">Сегодня</button>
      <button class="filter-btn date-filter-btn" onclick="setDateFilter('7days')">7 дней</button>
      <button class="filter-btn date-filter-btn" onclick="setDateFilter('30days')">30 дней</button>
    </div>

    <div style="display:flex; justify-content:flex-end; margin-bottom:12px;">
      <button class="btn-export" onclick="exportCSV()">Скачать CSV</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Имя</th>
          <th>Email</th>
          <th>Уровень</th>
          <th>Дата</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="participants-list">
        <tr><td colspan="5" class="empty-state">Загрузка...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="toast" id="toast"></div>

  <script src="utils.js"></script>
  <script>
    let currentFilter = 'all';
    let searchQuery = '';
    let dateFilter = 'all';
    let lastFiltered = [];
    let allParticipants = [];

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      renderTable();
    }

    function onSearch() {
      searchQuery = document.getElementById('search-input').value.toLowerCase();
      renderTable();
    }

    function setDateFilter(range) {
      dateFilter = range;
      document.querySelectorAll('.date-filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      renderTable();
    }

    function renderTable() {
      let filtered = currentFilter === 'all'
        ? allParticipants
        : allParticipants.filter(p => p.level === currentFilter);

      if (searchQuery) {
        filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery));
      }

      if (dateFilter !== 'all') {
        const now = new Date();
        const days = dateFilter === 'today' ? 0 : dateFilter === '7days' ? 7 : 30;
        const cutoff = new Date(now.getFullYear(), now.getMonth(), now.getDate() - days);
        filtered = filtered.filter(p => {
          if (!p.registered_at) return false;
          return new Date(p.registered_at) >= cutoff;
        });
      }

      lastFiltered = filtered;

      const tbody = document.getElementById('participants-list');
      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Нет участников</td></tr>';
        return;
      }
      tbody.innerHTML = filtered.map((p, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${p.name}</td>
          <td>${p.email}</td>
          <td><span class="level-badge level-${p.level}">${levelLabels[p.level] || p.level}</span></td>
          <td class="date-cell">${formatDate(p.registered_at)}</td>
          <td><button class="btn-delete" onclick="deleteParticipant('${p.email}')" title="Удалить">✕</button></td>
        </tr>
      `).join('');
    }

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    async function loadParticipants() {
      try {
        const res = await fetch('/participants');
        const data = await res.json();

        document.getElementById('stat-total').textContent = data.length;
        document.getElementById('stat-beginner').textContent = data.filter(p => p.level === 'beginner').length;
        document.getElementById('stat-intermediate').textContent = data.filter(p => p.level === 'intermediate').length;
        document.getElementById('stat-pro').textContent = data.filter(p => p.level === 'pro').length;

        allParticipants = data;
        renderTable();
      } catch (err) {
        document.getElementById('participants-list').innerHTML =
          '<tr><td colspan="5" class="empty-state">Сервер недоступен</td></tr>';
      }
    }

    async function deleteParticipant(email) {
      if (!confirm('Удалить участника?')) return;
      await fetch(`/participants/${encodeURIComponent(email)}`, { method: 'DELETE' });
      showToast('Участник удалён');
      loadParticipants();
    }

    function exportCSV() {
      if (lastFiltered.length === 0) {
        showToast('Нет данных для экспорта', 'error');
        return;
      }

      const csv = generateCSV(lastFiltered);
      if (!csv) {
        showToast('Нет данных для экспорта', 'error');
        return;
      }

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'participants.csv';
      a.click();
      URL.revokeObjectURL(url);

      showToast(`Экспортировано ${lastFiltered.length} участников`);
    }

    loadParticipants();
  </script>

</body>
</html>
